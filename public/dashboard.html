<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Davis Project | Личный кабинет</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/dashboard.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="noise"></div>

    <header class="header container">
      <a class="brand" href="/">
        <img class="brand-logo" src="/assets/davis-logo.png" alt="Логотип Davis Project" />
        <span class="brand-text">Davis <span>Project</span></span>
      </a>
      <nav class="nav">
        <a href="/">Главная</a>
        <a href="/documentflow">Документооборот</a>
        <a href="/factions">Фракции</a>
        <a href="/bot-builder">Создание бота</a>
        <a href="#settings">Настройки</a>
      </nav>
      <a class="discord-btn" href="/auth/logout">Выйти</a>
    </header>

    <main class="container dashboard">
      <section class="account-card reveal visible">
        <h1>Личный кабинет</h1>
        <p id="accountName" class="muted">Загрузка профиля...</p>
      </section>

      <section id="settings" class="settings-card reveal visible">
        <h2>Настройки аккаунта</h2>
        <form id="settingsForm" class="settings-form">
          <label>
            Отображаемое имя
            <input id="displayName" name="displayName" type="text" maxlength="50" required />
          </label>

          <label>
            Основное направление
            <select id="rolePath" name="rolePath" required>
              <option value="newbie">Новичок</option>
              <option value="state">Госслужащий</option>
              <option value="crime">Криминальный игрок</option>
            </select>
          </label>

          <label>
            Стартовый раздел
            <select id="preferredSection" name="preferredSection" required>
              <option value="guides">Гайды</option>
              <option value="jobs">Заработок</option>
              <option value="discord">Discord-комьюнити</option>
            </select>
          </label>

          <label class="checkbox">
            <input id="notificationsEnabled" name="notificationsEnabled" type="checkbox" />
            Включить уведомления о новых материалах
          </label>

          <div class="actions">
            <button class="cta cta-primary" type="submit">Сохранить настройки</button>
            <a class="cta cta-ghost" href="/">На главную</a>
          </div>
          <p id="saveStatus" class="muted"></p>
        </form>
      </section>
    </main>

    <script src="/dashboard.js"></script>
  </body>
</html>
