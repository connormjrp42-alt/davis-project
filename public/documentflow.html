<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Davis Project | Документооборот</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@400;500;700&family=Caveat:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/assets/davis-logo.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="noise"></div>

    <header class="header container">
      <a class="brand" href="/">
        <img class="brand-logo" src="/assets/davis-logo.png" alt="Логотип Davis Project" />
        <span class="brand-text">Davis <span>Project</span></span>
      </a>
      <nav class="nav" id="mainNav">
        <a href="/">Главная</a>
        <a href="/consultant">Консультант</a>
        <a href="/documentflow" class="active">Документооборот</a>
        <a href="/factions">Фракции</a>
        <a href="/bot-builder">Создание бота</a>
      </nav>
      <a class="discord-btn" href="/auth/discord">Войти через Discord</a>
    </header>

    <main class="container docflow-page">
      <section class="card docflow-top">
        <h1>Документооборот Majestic</h1>
        <p class="docflow-subtitle">Конструктор шаблонов документов: добавляйте реквизиты, подписи, печати и структуру бланка. Заполнение сохраняется персонально.</p>
        <p id="docflowStatus" class="docflow-status"></p>
      </section>

      <section class="docflow-layout">
        <aside class="card docflow-sidebar">
          <label>Сервер<select id="docflowServerFilter"></select></label>
          <div id="docflowTemplateList" class="docflow-template-list"></div>
          <button id="docflowCreateBtn" class="cta cta-primary" type="button" hidden>Создать шаблон</button>
        </aside>

        <section class="card docflow-work">
          <div class="docflow-headline">
            <h2 id="docflowTemplateTitle">Выберите шаблон</h2>
            <div class="docflow-actions">
              <button id="docflowModeBtn" class="cta cta-ghost" type="button" hidden>Режим: редактирование</button>
              <button id="docflowSaveFillBtn" class="cta cta-ghost" type="button" hidden>Сохранить заполнение</button>
              <button id="docflowPngBtn" class="cta cta-ghost" type="button" hidden>PNG</button>
              <button id="docflowPdfBtn" class="cta cta-ghost" type="button" hidden>PDF</button>
              <button id="docflowSaveTemplateBtn" class="cta cta-primary" type="button" hidden>Сохранить шаблон</button>
              <button id="docflowDeleteTemplateBtn" class="cta cta-ghost" type="button" hidden>Удалить шаблон</button>
            </div>
          </div>

          <div id="docflowEditor" class="docflow-editor" hidden>
            <div class="docflow-template-meta">
              <label>Название шаблона<input id="docflowMetaTitle" type="text" maxlength="120" /></label>
              <label>Сервер<select id="docflowMetaServer"></select></label>
              <label>Описание<input id="docflowMetaDescription" type="text" maxlength="500" /></label>
            </div>

            <div id="docflowTools" class="docflow-tools" hidden>
              <button data-add="text" type="button">Текст</button>
              <button data-add="heading" type="button">Заголовок</button>
              <button data-add="image" type="button">Изображение</button>
              <button data-add="date" type="button">Дата</button>
              <button data-add="signature" type="button">Подпись</button>
              <button data-add="line" type="button">Линия</button>
            </div>

            <div class="docflow-quick-tools">
              <label>Масштаб <input id="docflowZoom" type="range" min="20" max="120" step="5" value="100" /></label>
              <label class="docflow-checkbox"><input id="docflowSnap" type="checkbox" checked /> Привязка к сетке</label>
            </div>

            <div class="docflow-builder-grid">
              <div id="docflowCanvasWrap" class="docflow-canvas-wrap">
                <div id="docflowCanvas" class="docflow-canvas"></div>
              </div>

              <aside class="docflow-sidepanel">
                <section class="docflow-layers">
                  <h3>Слои</h3>
                  <div id="docflowLayerList" class="docflow-layer-list"></div>
                </section>

                <section id="docflowProperties" class="docflow-properties" hidden>
                  <h3>Свойства элемента</h3>
                  <label>Название элемента<input id="propLabel" type="text" maxlength="120" /></label>
                  <label>Текст / значение по умолчанию<textarea id="propText" rows="3" maxlength="4000"></textarea></label>
                  <label>Подсказка<input id="propPlaceholder" type="text" maxlength="140" /></label>
                  <label id="propSignatureWrap" hidden>Имя и фамилия для подписи<input id="propSignatureValue" type="text" maxlength="120" placeholder="Например: Connor Davis" /></label>
                  <label>URL изображения (или выберите с блока)<input id="propSrc" type="url" maxlength="2000" /></label>
                  <div class="docflow-props-row">
                    <label>Размер шрифта<input id="propFontSize" type="number" min="10" max="64" /></label>
                    <label>Цвет текста<input id="propColor" type="color" /></label>
                  </div>
                  <div class="docflow-props-row">
                    <label>Фон<input id="propBgColor" type="color" /></label>
                    <label>Цвет границы<input id="propBorderColor" type="color" /></label>
                  </div>
                  <div class="docflow-props-row">
                    <label>Толщина границы<input id="propBorderWidth" type="number" min="0" max="20" /></label>
                    <label>Скругление<input id="propRadius" type="number" min="0" max="120" /></label>
                  </div>
                  <div class="docflow-props-row">
                    <label>Прозрачность<input id="propOpacity" type="number" min="0.1" max="1" step="0.1" /></label>
                    <label>Поворот<input id="propRotate" type="number" min="-180" max="180" /></label>
                  </div>
                  <div class="docflow-props-row">
                    <label>Жирность<select id="propWeight"><option value="normal">Обычный</option><option value="600">600</option><option value="700">700</option><option value="800">800</option></select></label>
                    <label>Выравнивание<select id="propAlign"><option value="left">Слева</option><option value="center">По центру</option><option value="right">Справа</option></select></label>
                  </div>
                  <div class="docflow-props-row">
                    <label class="docflow-checkbox"><input id="propRequired" type="checkbox" /> Обязательное поле</label>
                    <label class="docflow-checkbox"><input id="propLocked" type="checkbox" /> Заблокировать элемент</label>
                    <label class="docflow-checkbox"><input id="propHidden" type="checkbox" /> Скрыть элемент</label>
                  </div>
                  <button id="propDelete" class="cta cta-ghost" type="button">Удалить элемент</button>
                </section>
              </aside>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="/main.js"></script>
    <script src="/documentflow.js"></script>
  </body>
</html>
