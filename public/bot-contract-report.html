<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Davis Project | Отчет по контракту</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .contract-report-wrap {
        max-width: 920px;
        margin: 28px auto;
      }
      .contract-report-card {
        display: grid;
        gap: 12px;
      }
      .contract-report-card h1 {
        margin: 0;
      }
      .contract-report-form {
        display: grid;
        gap: 12px;
      }
      .contract-report-form label {
        display: grid;
        gap: 6px;
      }
      .contract-report-form input,
      .contract-report-form textarea,
      .contract-report-form select {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font: inherit;
        padding: 10px 12px;
      }
      .contract-report-form textarea {
        min-height: 96px;
        resize: vertical;
      }
      .contract-report-preview {
        display: none;
        max-width: 100%;
        border-radius: 10px;
        border: 1px solid rgba(209, 167, 255, 0.35);
      }
      .contract-report-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .contract-report-status {
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="noise"></div>

    <main class="container contract-report-wrap">
      <section class="card contract-report-card">
        <h1 id="contractReportTitle">Загрузка...</h1>
        <p id="contractReportSubtitle" class="consultant-subtitle">Подождите, загружаю форму отчета по контракту.</p>
        <form id="contractReportForm" class="contract-report-form" hidden>
          <label>
            Ваше имя / ник
            <input
              id="contractReportApplicantInput"
              type="text"
              maxlength="120"
              placeholder="Например: Connor Davis"
              required
            />
          </label>
          <label>
            Контракт
            <select id="contractReportContractSelect" required></select>
          </label>
          <label>
            Скриншот выполнения
            <input id="contractReportScreenshotInput" type="file" accept="image/png,image/jpeg,image/webp" required />
          </label>
          <img id="contractReportScreenshotPreview" class="contract-report-preview" alt="Превью скриншота" />
          <label>
            Комментарий (необязательно)
            <textarea
              id="contractReportCommentInput"
              maxlength="1600"
              placeholder="Коротко опишите, как выполнили контракт"
            ></textarea>
          </label>
          <div class="contract-report-actions">
            <button id="contractReportSubmitBtn" class="cta cta-primary" type="submit">Отправить отчет</button>
          </div>
        </form>
        <p id="contractReportStatus" class="contract-report-status"></p>
      </section>
    </main>

    <script src="/bot-contract-report.js"></script>
  </body>
</html>
