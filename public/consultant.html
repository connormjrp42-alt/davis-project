<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Davis Project | Консультант</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/assets/davis-logo.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="noise"></div>

    <header class="header container">
      <a class="brand" href="/">
        <img class="brand-logo" src="/assets/davis-logo.png" alt="Логотип Davis Project" />
        <span class="brand-text">Davis <span>Project</span></span>
      </a>
      <nav class="nav" id="mainNav">
        <a href="/">Главная</a>
        <a href="/consultant" class="active">Консультант</a>
        <a href="/documentflow">Документооборот</a>
        <a href="/factions">Фракции</a>
        <a href="/bot-builder">Создание бота</a>
      </nav>
      <a class="discord-btn" href="/auth/discord">Войти через Discord</a>
    </header>

    <main class="container page-content">
      <section class="card consultant-wrap">
        <h1>Консультант по законодательству Majestic</h1>
        <p class="consultant-subtitle">
          Выберите сервер, опишите вопрос или ситуацию, и система попробует изучить законодательную базу сервера на форуме Majestic RP.
        </p>

        <form id="consultantForm" class="consultant-form">
          <label>
            Сервер Majestic
            <select id="consultantServer" required></select>
          </label>

          <label>
            Ваш вопрос / ситуация
            <textarea
              id="consultantQuestion"
              rows="6"
              maxlength="1200"
              placeholder="Например: На сервере Phoenix какие правила по задержанию гражданского и срокам оформления протокола?"
              required
            ></textarea>
          </label>

          <button type="submit" class="cta cta-primary">Разобрать вопрос</button>
        </form>

        <p id="consultantStatus" class="consultant-status"></p>
        <p id="consultantSyncMeta" class="consultant-sync-meta"></p>

        <section id="consultantResult" class="consultant-result" hidden>
          <h2>Ответ консультанта</h2>
          <pre id="consultantAnswer" class="consultant-answer"></pre>
          <div id="consultantSources" class="consultant-sources"></div>
        </section>
      </section>
    </main>

    <script src="/main.js"></script>
    <script src="/consultant.js"></script>
  </body>
</html>
